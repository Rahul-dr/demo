<!DOCTYPE html>
<html>
<head>
    <title>Simple App</title>
</head>
<body>

<h2>Test API</h2>
<button onclick="callApi()">Call Backend</button>
<p id="result"></p>

<script>
    function callApi() {
        fetch("http://localhost:8080/hello")
            .then(res => res.text())
            .then(data => {
                document.getElementById("result").innerText = data;
            });
    }
</script>

</body>
</html>
